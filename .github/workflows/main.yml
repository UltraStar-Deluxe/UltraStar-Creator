name: Build

on:
  push:
    branches: "*"
    tags:
      - "[0-9].[0-9].[0-9]"

jobs:
  build_windows:
    name: Build for Windows
    runs-on: windows-latest

    steps:
      - name: Get Number of CPU Cores
        id: cpu-cores
        run: echo "count=$(node -e 'console.log(require("os").availableParallelism())')" >> $GITHUB_OUTPUT
      - name: Set up MSVC Environment
        uses: compnerd/gha-setup-vsdevenv@v6
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          arch: "win64_msvc2022_64"
          cache: true
      - name: Cache Windows dependencies
        id: cache-windows-dependencies
        uses: actions/cache@v5
        with:
          path: |
            lib/windows
            include/taglib
            include/bass
            include/bass_fx
          key: win-deps-${{ runner.os }}-${{ hashFiles('**/*.pro') }}
      - name: Fetch TagLib library
        if: steps.cache-windows-dependencies.outputs.cache-hit != 'true'
        run: |
          vcpkg --vcpkg-root=C:\vcpkg install taglib:x64-windows
          vcpkg integrate install
          $repoRoot = "${{ github.workspace }}"
          New-Item -Force -ItemType Directory "$repoRoot\bin\release"
          New-Item -Force -ItemType Directory "$repoRoot\include\taglib"
          New-Item -Force -ItemType Directory "$repoRoot\lib\windows"
          Copy-Item "C:\vcpkg\installed\x64-windows\bin\tag.dll" "$repoRoot\bin\release" -Force
          Copy-Item "C:\vcpkg\installed\x64-windows\lib\tag.lib" "$repoRoot\lib\windows" -Force
          Copy-Item "C:\vcpkg\installed\x64-windows\include\taglib\*" "$repoRoot\include\taglib" -Force -Recurse
      - name: Fetch BASS library
        run: |
          $repoRoot = "${{ github.workspace }}"
          curl -L -o bass.zip https://www.un4seen.com/files/bass24.zip
          unzip bass.zip -d bass-tmp
          New-Item -Force -ItemType Directory "$repoRoot\include\bass"
          Copy-Item "$repoRoot\bass-tmp\c\bass.h" "$repoRoot\include\bass\" -Force
          Copy-Item "$repoRoot\bass-tmp\c\x64\bass.lib" "$repoRoot\lib\windows\" -Force
          Copy-Item "$repoRoot\bass-tmp\x64\bass.dll" "$repoRoot\bin\release\" -Force
          Remove-Item -Recurse -Force bass.zip,bass-tmp
      - name: Fetch BASS_FX library
        run: |
          $repoRoot = "${{ github.workspace }}"
          curl -L -o bass_fx.zip https://www.un4seen.com/files/z/0/bass_fx24.zip
          unzip bass_fx.zip -d bass_fx-tmp
          New-Item -Force -ItemType Directory "$repoRoot\include\bass_fx"
          Copy-Item "$repoRoot\bass_fx-tmp\C\bass_fx.h" "$repoRoot\include\bass_fx\" -Force
          Copy-Item "$repoRoot\bass_fx-tmp\C\x64\bass_fx.lib" "$repoRoot\lib\windows\" -Force
          Copy-Item "$repoRoot\bass_fx-tmp\x64\bass_fx.dll" "$repoRoot\bin\release\" -Force
          Remove-Item -Recurse -Force bass_fx.zip,bass_fx-tmp
      - name: Install cld2
        run: |
          $repoRoot = "${{ github.workspace }}"  
          cd include
          git clone --depth 1 https://github.com/CLD2Owners/cld2.git
          cd cld2/internal
          cl /TP /GR /EHsc /c /MD cldutil.cc cldutil_shared.cc compact_lang_det.cc compact_lang_det_hint_code.cc compact_lang_det_impl.cc debug.cc fixunicodevalue.cc generated_entities.cc generated_language.cc generated_ulscript.cc getonescriptspan.cc lang_script.cc offsetmap.cc scoreonescriptspan.cc tote.cc utf8statetable.cc cld_generated_cjk_uni_prop_80.cc cld2_generated_cjk_compatible.cc cld_generated_cjk_delta_bi_32.cc generated_distinct_bi_0.cc cld2_generated_quad0122.cc cld2_generated_deltaocta0122.cc cld2_generated_distinctocta0122.cc cld_generated_score_quad_octa_0122.cc
          link /dll /out:cld2.dll *.obj
          lib /out:cld2.lib *.obj
          Copy-Item "$repoRoot\include\cld2\internal\cld2.lib" "$repoRoot\lib\windows" -Force
          Copy-Item "$repoRoot\include\cld2\internal\cld2.dll" "$repoRoot\bin\release" -Force
      - name: Build
        run: |
          cd src
          qmake6 UltraStar-Creator.pro -spec win32-msvc
          set CL=/MP${{ steps.cpu-cores.outputs.count }}
          nmake
      - name: Install NSIS
        uses: negrutiu/nsis-install@v2
        id: nsis
      - name: Create installer
        uses: joncloud/makensis-action@v5.0
        with:
          script-file: setup/windows/UltraStar-Creator.nsi
      - name: Upload Portable Artifact
        uses: actions/upload-artifact@v6
        with:
          name: WIN64-UltraStar-Creator-portable
          path: bin/release
          if-no-files-found: error
      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v6
        with:
          name: WIN64-UltraStar-Creator-installer
          path: bin/WIN64-UltraStar-Creator*-setup.exe
          if-no-files-found: error

  build_mac:
    name: Build for MacOS (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, macos-15-intel]
      fail-fast: false
    steps:
      - name: Get Number of CPU Cores
        id: cpu-cores
        run: echo "count=$(node -e 'console.log(require("os").availableParallelism())')" >> $GITHUB_OUTPUT
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Determine Arch
        run: |
          ARCH=$(uname -m)
          if [[ "$ARCH" == "x86_64" ]]; then
            echo "arch=x86" >> $GITHUB_ENV
          else
            echo "arch=ARM" >> $GITHUB_ENV
          fi
      - name: Cache Homebrew
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-${{ hashFiles('**/*.pro') }}
      - name: Install Dependencies
        run: |
          brew update
          brew install taglib create-dmg qt
      - name: Fetch BASS library
        run: |
          REPO_ROOT="${{ github.workspace }}"
          curl -L -o bass.zip https://www.un4seen.com/files/bass24-osx.zip
          unzip -q bass.zip -d bass-tmp
          mkdir -p "$REPO_ROOT/include/bass"
          cp bass-tmp/c/bass.h "$REPO_ROOT/include/bass/"
          mkdir -p "$REPO_ROOT/lib/macos"
          cp bass-tmp/libbass.dylib "$REPO_ROOT/lib/macos/"
          rm -rf bass.zip bass-tmp
      - name: Fetch BASS_FX library
        run: |
          REPO_ROOT="${{ github.workspace }}"
          curl -L -o bass_fx.zip https://www.un4seen.com/files/z/0/bass_fx24-osx.zip
          unzip -q bass_fx.zip -d bass_fx-tmp
          mkdir -p "$REPO_ROOT/include/bass_fx"
          cp bass_fx-tmp/bass_fx.h "$REPO_ROOT/include/bass_fx/"
          cp bass_fx-tmp/libbass_fx.dylib "$REPO_ROOT/lib/macos/"
          rm -rf bass_fx.zip bass_fx-tmp
      - name: Fetch, patch and build cld2
        run: |
          cd include
          git clone --depth 1 https://github.com/CLD2Owners/cld2.git
          patch cld2/internal/compile_libs.sh cld2-mac-compile.patch || true
          cd cld2/internal/
          export CFLAGS="-Wno-narrowing -O3"
          ./compile_libs.sh
          install_name_tool -id @executable_path/lib$LIB_NAME.dylib lib$LIB_NAME.dylib
          cp libcld2.dylib ../../../lib/macos
      - name: Fix Qt lib rpaths # see: https://github.com/orgs/Homebrew/discussions/2823#discussioncomment-2010340)
        run: |
          install_name_tool -id '@rpath/QtCore.framework/Versions/A/QtCore' $(brew --prefix)/lib/QtCore.framework/Versions/A/QtCore
          install_name_tool -id '@rpath/QtGui.framework/Versions/A/QtGui' $(brew --prefix)/lib/QtGui.framework/Versions/A/QtGui
          install_name_tool -id '@rpath/QtNetwork.framework/Versions/A/QtNetwork' $(brew --prefix)/lib/QtNetwork.framework/Versions/A/QtNetwork
          install_name_tool -id '@rpath/QtWidgets.framework/Versions/A/QtWidgets' $(brew --prefix)/lib/QtWidgets.framework/Versions/A/QtWidgets
          install_name_tool -id '@rpath/QtPdf.framework/Versions/A/QtPdf' $(brew --prefix)/lib/QtPdf.framework/Versions/A/QtPdf
          install_name_tool -id '@rpath/QtSvg.framework/Versions/A/QtSvg' $(brew --prefix)/lib/QtSvg.framework/Versions/A/QtSvg
          install_name_tool -id '@rpath/QtVirtualKeyboard.framework/Versions/A/QtVirtualKeyboard' $(brew --prefix)/lib/QtVirtualKeyboard.framework/Versions/A/QtVirtualKeyboard
          install_name_tool -id '@rpath/QtQuick.framework/Versions/A/QtQuick' $(brew --prefix)/lib/QtQuick.framework/Versions/A/QtQuick
          install_name_tool -id '@rpath/QtQmlModels.framework/Versions/A/QtQmlModels' $(brew --prefix)/lib/QtQmlModels.framework/Versions/A/QtQmlModels
          install_name_tool -id '@rpath/QtQml.framework/Versions/A/QtQml' $(brew --prefix)/lib/QtQml.framework/Versions/A/QtQml
          install_name_tool -id '@rpath/QtOpenGL.framework/Versions/A/QtOpenGL' $(brew --prefix)/lib/QtOpenGL.framework/Versions/A/QtOpenGL
          install_name_tool -id '@rpath/QtMultimedia.framework/Versions/A/QtMultimedia' $(brew --prefix)/lib/QtMultimedia.framework/Versions/A/QtMultimedia
      - name: Build
        run: |
          cd src
          qmake6 UltraStar-Creator.pro
          make -j${{ steps.cpu-cores.outputs.count }}
      - name: Create DMG
        run: |
          cd bin/release
          create-dmg \
            --volname "UltraStar-Creator" \
            --volicon ../../src/resources/UltraStar-Creator.icns \
            --app-drop-link 350 170 \
            --background ../../setup/macos/img/UltraStar-Creator_bg.png \
            --hide-extension UltraStar-Creator.app \
            --window-size 500 300 \
            --text-size 14 \
            --icon-size 64 \
            --icon UltraStar-Creator.app 150 170 \
            --no-internet-enable \
            --skip-jenkins \
            UltraStar-Creator.dmg \
            UltraStar-Creator.app
            mv UltraStar-Creator.dmg MAC-${{ env.arch }}-UltraStar-Creator.dmg
      - name: Upload Portable Artifact
        uses: actions/upload-artifact@v6
        with:
          name: MAC-${{ env.arch }}-UltraStar-Creator-portable
          path: bin/release
          if-no-files-found: error
      - name: Upload Image Artifact
        uses: actions/upload-artifact@v6
        with:
          name: MAC-${{ env.arch }}-UltraStar-Creator-image
          path: bin/release/MAC-${{ env.arch }}-UltraStar-Creator.dmg
          if-no-files-found: error

  build_linux:
    name: Build for Linux
    runs-on: ubuntu-20.04

    steps:
      - name: Get Number of CPU Cores
        id: cpu-cores
        run: echo "count=$(node -e 'console.log(require("os").availableParallelism())')" >> $GITHUB_OUTPUT
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Cache Qt
        uses: actions/cache@v5
        with:
          path: ~/.cache/Qt
          key: qt-${{ runner.os }}-${{ hashFiles('**/*.pro') }}
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
      - name: Install Dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y libgl1-mesa-dev build-essential
          sudo apt install libtag1-dev libcld2-dev
          sudo apt install -y libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libxcb-xkb-dev libxkbcommon-x11-0 libxcb-cursor0 libgtk2.0-dev libfuse2
      - name: Fetch BASS library
        run: |
          REPO_ROOT="${{ github.workspace }}"
          curl -L -o bass.zip https://www.un4seen.com/files/bass24-linux.zip
          unzip -q bass.zip -d bass-tmp
          mkdir -p "$REPO_ROOT/include/bass"
          cp bass-tmp/c/bass.h "$REPO_ROOT/include/bass/"
          mkdir -p "$REPO_ROOT/lib/linux"
          if [ "$(uname -m)" = "aarch64" ]; then
            cp bass-tmp/aarch64/libbass.so "$REPO_ROOT/lib/linux/"
          elif [ "$(uname -m)" = "armv7l" ]; then
            cp bass-tmp/armhf/libbass.so "$REPO_ROOT/lib/linux/"
          elif [ "$(uname -m)" = "x86_64" ]; then
            cp bass-tmp/x86_64/libbass.so "$REPO_ROOT/lib/linux/"
          fi
          rm -rf bass.zip bass-tmp
      - name: Fetch BASS_FX library
        run: |
          REPO_ROOT="${{ github.workspace }}"
          curl -L -o bass_fx.zip https://www.un4seen.com/files/z/0/bass_fx24-linux.zip
          unzip -q bass_fx.zip -d bass_fx-tmp
          mkdir -p "$REPO_ROOT/include/bass_fx"
          cp bass_fx-tmp/c/bass_fx.h "$REPO_ROOT/include/bass_fx/"
          if [ "$(uname -m)" = "aarch64" ]; then
            cp bass_fx-tmp/aarch64/libbass_fx.so "$REPO_ROOT/lib/linux/"
          elif [ "$(uname -m)" = "armv7l" ]; then
            cp bass_fx-tmp/armhf/libbass_fx.so "$REPO_ROOT/lib/linux/"
          elif [ "$(uname -m)" = "x86_64" ]; then
            cp bass_fx-tmp/x86_64/libbass_fx.so "$REPO_ROOT/lib/linux/"
          fi
          rm -rf bass_fx.zip bass_fx-tmp
      - name: Build
        run: |
          cd src
          qmake6 UltraStar-Creator.pro
          make -j${{ steps.cpu-cores.outputs.count }}
      - name: Create AppImage
        run: |
          cd bin/release
          wget https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod a+x linuxdeployqt*.AppImage
          cp ../../setup/linux/UltraStar-Creator.desktop .
          cp ../../setup/linux/UltraStar-Creator.png .
          sed -i "s/Name=UltraStar-Creator/Name=LINUX-UltraStar-Creator/g" UltraStar-Creator.desktop
          ./linuxdeployqt*.AppImage UltraStar-Creator.desktop -bundle-non-qt-libs -appimage
          mv LINUX-UltraStar-Creator-*.AppImage LINUX-UltraStar-Creator.AppImage
      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v6
        with:
          name: LINUX-UltraStar-Creator-appimage
          path: bin/release/LINUX-UltraStar-Creator.AppImage
          if-no-files-found: error

  draft_release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    name: Draft a Release
    needs: [build_windows, build_mac, build_linux]
    runs-on: ubuntu-20.04
    steps:
      - name: Download Artifacts from Build Jobs
        uses: actions/download-artifact@v8
        with:
          path: .
          pattern: "*"
      - name: Compress Portable Folders
        run: |
          zip -r MAC-x86-UltraStar-Creator-portable.zip MAC-x86-UltraStar-Creator-portable
          zip -r MAC-ARM-UltraStar-Creator-portable.zip MAC-ARM-UltraStar-Creator-portable
          zip -r WIN64-UltraStar-Creator-portable.zip WIN64-UltraStar-Creator-portable
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "LINUX-UltraStar-Creator-appimage/*, MAC-x86-UltraStar-Creator-image/*, MAC-x86-UltraStar-Creator-portable.zip, MAC-ARM-UltraStar-Creator-image/*, MAC-ARM-UltraStar-Creator-portable.zip, WIN64-UltraStar-Creator-installer/*, WIN64-UltraStar-Creator-portable.zip"
          draft: true
          artifactErrorsFailBuild: true
